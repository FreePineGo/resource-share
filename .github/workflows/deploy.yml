name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: resource-share/package-lock.json

      - name: Install dependencies
        working-directory: resource-share
        run: npm ci

      - name: Build
        working-directory: resource-share
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://your-domain.com' }}

      - name: Push to Baidu (optional)
        working-directory: resource-share
        run: npm run push
        if: ${{ secrets.BAIDU_TOKEN != '' }}
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://your-domain.com' }}
          BAIDU_SITE: ${{ vars.BAIDU_SITE }}
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=resource-share
          workingDirectory: resource-share